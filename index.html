<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Encryptor</title>

  <link rel="stylesheet" href="style.css">

  <!-- CryptoJS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

  <!-- particles -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
</head>

<body>

  <!-- الخلفية -->
  <div id="particles-js"></div>

  <div class="container">
    <div class="glass-card">

      <h2>🔐 Secure Encryptor</h2>

      <textarea id="text" placeholder="Type your secret message..."></textarea>

      <input type="password" id="password" placeholder="Enter password (optional)">

      <div class="buttons">
        <button class="encrypt" onclick="encrypt()">Encrypt</button>
        <button class="decrypt" onclick="decrypt()">Decrypt</button>
        <button class="copy" onclick="copyText()">📋 Copy</button>
        <button class="clear" onclick="clearAll()">🧹 Clear</button>
      </div>

      <p id="result">Your result will appear here...</p>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
